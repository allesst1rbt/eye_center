services:
  # The Application
  app:
    build:
      context: ./
      dockerfile: app.dockerfile
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      database:
        condition: service_healthy
  # The Database
  database:
    image: postgres:16
    volumes:
      - ./postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=eye_center
      - POSTGRES_USER=eye_center
      - POSTGRES_PASSWORD=eye_center
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eye_center -d eye_center"]
      interval: 2s
      timeout: 20s
      retries: 10
  # The Web Server
  web:
    platform: linux/amd64
    build:
      context: ./
      dockerfile: web.dockerfile
    working_dir: /var/www/
    volumes_from:
      - app
    links:
      - database
      - app
    ports:
      - 8080:80
      - 5173:5173
    depends_on:
      - app
